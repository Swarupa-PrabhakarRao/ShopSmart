<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSmart | Products</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .filter-bar input, .filter-bar select {
            flex: 1;
            min-width: 200px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">ShopSmart.</a>
            <div style="display: flex; gap: 2rem; align-items: center;">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html" style="color: var(--accent);">Products</a></li>
                </ul>
                <ul class="nav-links" id="auth-links">
                    <li><a href="auth.html">Login</a></li>
                    <li><a href="auth.html?mode=signup" class="btn">Sign Up</a></li>
                </ul>
                <ul class="nav-links hidden" id="user-links">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="cancel-orders.html">Cancel Orders</a></li>
                    <li><a href="cart.html">Cart</a></li>
                    <li>
                        <div class="profile-dropdown" onclick="toggleProfileDropdown(event)">
                            <div class="profile-icon" id="profile-initials">U</div>
                            <div id="profileDropdown" class="dropdown-content">
                                <div class="dropdown-header">
                                    <strong id="profile-name">User</strong>
                                    <span id="profile-email">user@example.com</span>
                                </div>
                                <a href="#" onclick="logout()">Logout</a>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <h1>All Products</h1>
        
        <div class="filter-bar mt-2">
            <input type="text" id="search-input" class="form-control" placeholder="Search products...">
            <select id="category-select" class="form-control">
                <option value="">All Categories</option>
                <option value="Electronics">Electronics</option>
                <option value="Clothing">Clothing</option>
                <option value="Accessories">Accessories</option>
                <option value="Groceries">Groceries</option>
            </select>
        </div>

        <div class="grid product-grid" id="products-container">
            <p class="text-muted">Loading...</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ShopSmart. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            
            document.getElementById('search-input').addEventListener('input', debounce(loadProducts, 500));
            document.getElementById('category-select').addEventListener('change', loadProducts);
        });

        async function loadProducts() {
            const search = document.getElementById('search-input').value;
            const category = document.getElementById('category-select').value;
            
            let query = '?';
            if (search) query += `search=${encodeURIComponent(search)}&`;
            if (category) query += `category=${encodeURIComponent(category)}`;

            try {
                const products = await api.products.getAll(query);
                renderProducts(products);
            } catch (err) {
                console.error(err);
                document.getElementById('products-container').innerHTML = '<p style="color: #ef4444;">Failed to load products.</p>';
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            
            if (products.length === 0) {
                container.innerHTML = '<p class="text-muted">No products found for the given criteria.</p>';
                return;
            }

            products.forEach(p => {
                container.innerHTML += `
                    <div class="card">
                        <img src="${p.image}" alt="${p.name}" class="product-img">
                        <div class="badge">${p.category}</div>
                        <h3 class="mt-1">${p.name}</h3>
                        <p class="product-price">$${p.price.toFixed(2)}</p>
                        <a href="product-detail.html?id=${p._id}" onclick="localStorage.setItem('currentProductId', '${p._id}')" class="btn">View Details</a>
                    </div>
                `;
            });
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }
    </script>
</body>
</html>
