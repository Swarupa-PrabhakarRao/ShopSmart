<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSmart | Authentication</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container { max-width: 400px; margin: 4rem auto; }
        .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
        .tab { flex: 1; text-align: center; padding: 1rem; cursor: pointer; color: var(--text-muted); }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: 600; }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">ShopSmart.</a>
            <div style="display: flex; gap: 2rem; align-items: center;">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                </ul>
                <ul class="nav-links" id="auth-links">
                    <li><a href="auth.html" style="color: var(--accent);">Login</a></li>
                    <li><a href="auth.html?mode=signup" class="btn">Sign Up</a></li>
                </ul>
                <ul class="nav-links hidden" id="user-links">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="cancel-orders.html">Cancel Orders</a></li>
                    <li><a href="cart.html">Cart</a></li>
                    <li>
                        <div class="profile-dropdown" onclick="toggleProfileDropdown(event)">
                            <div class="profile-icon" id="profile-initials">U</div>
                            <div id="profileDropdown" class="dropdown-content">
                                <div class="dropdown-header">
                                    <strong id="profile-name">User</strong>
                                    <span id="profile-email">user@example.com</span>
                                </div>
                                <a href="#" onclick="logout()">Logout</a>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <div class="auth-container">
            <div class="card">
                <div class="tabs">
                    <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
                    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
                </div>

                <div id="error-msg" style="color: #ef4444; margin-bottom: 1rem; text-align: center;"></div>

                <form id="auth-form">
                    <div class="form-group hidden" id="name-group">
                        <label>Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Submit</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ShopSmart. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        let isLogin = true;

        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('mode') === 'signup') {
            switchTab('signup');
        }

        function switchTab(mode) {
            isLogin = mode === 'login';
            document.getElementById('tab-login').classList.toggle('active', isLogin);
            document.getElementById('tab-signup').classList.toggle('active', !isLogin);
            document.getElementById('name-group').classList.toggle('hidden', isLogin);
            document.getElementById('name').required = !isLogin;
            document.getElementById('error-msg').innerText = '';
        }

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const errorMsg = document.getElementById('error-msg');
            errorMsg.innerText = '';
            
            // disable btn while submitting
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerText = 'Processing...';
            btn.disabled = true;

            try {
                let res;
                if (isLogin) {
                    res = await api.auth.login({ email, password });
                } else {
                    res = await api.auth.signup({ name, email, password });
                }
                localStorage.setItem('token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorMsg.innerText = err.message;
            } finally {
                btn.innerText = 'Submit';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
