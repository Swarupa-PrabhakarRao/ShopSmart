<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSmart | Product Details</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-detail-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin-top: 3rem;
        }
        .main-img {
            width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .price-tag {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            margin: 1rem 0;
        }
        @media (max-width: 768px) {
            .product-detail-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">ShopSmart.</a>
            <div style="display: flex; gap: 2rem; align-items: center;">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                </ul>
                 <ul class="nav-links" id="auth-links">
                    <li><a href="auth.html">Login</a></li>
                    <li><a href="auth.html?mode=signup" class="btn">Sign Up</a></li>
                </ul>
                <ul class="nav-links hidden" id="user-links">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="cancel-orders.html">Cancel Orders</a></li>
                    <li><a href="cart.html">Cart</a></li>
                    <li>
                        <div class="profile-dropdown" onclick="toggleProfileDropdown(event)">
                            <div class="profile-icon" id="profile-initials">U</div>
                            <div id="profileDropdown" class="dropdown-content">
                                <div class="dropdown-header">
                                    <strong id="profile-name">User</strong>
                                    <span id="profile-email">user@example.com</span>
                                </div>
                                <a href="#" onclick="logout()">Logout</a>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <a href="products.html" class="text-muted" style="text-decoration: none;">← Back to products</a>
        <div id="product-detail-content">
            <p class="text-muted mt-2">Loading product details...</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ShopSmart. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id') || localStorage.getItem('currentProductId');
            const container = document.getElementById('product-detail-content');

            if (!productId) {
                container.innerHTML = '<p class="text-muted">Product not found.</p>';
                return;
            }

            try {
                const product = await api.products.getById(productId);
                container.innerHTML = `
                    <div class="product-detail-container">
                        <div>
                            <img src="${product.image}" alt="${product.name}" class="main-img">
                        </div>
                        <div>
                            <div class="badge mb-1" style="display:inline-block">${product.category}</div>
                            <h1>${product.name}</h1>
                            <div class="price-tag">$${product.price.toFixed(2)}</div>
                            <p class="text-muted mb-2" style="font-size: 1.1rem">${product.description}</p>
                            
                            <div class="form-group" style="width: 100px;">
                                <label>Quantity</label>
                                <input type="number" id="qty" class="form-control" value="1" min="1">
                            </div>
                            
                            <button id="add-to-cart-btn" class="btn mt-1" style="width: 100%; font-size: 1.2rem; padding: 1rem;">Add to Cart</button>
                            <div id="status-msg" class="mt-1"></div>
                        </div>
                    </div>
                `;

                document.getElementById('add-to-cart-btn').addEventListener('click', async () => {
                    const statusMsg = document.getElementById('status-msg');
                    
                    if (!localStorage.getItem('token')) {
                        window.location.href = 'auth.html';
                        return;
                    }

                    const qty = parseInt(document.getElementById('qty').value);
                    try {
                        document.getElementById('add-to-cart-btn').innerText = 'Adding...';
                        await api.cart.add(product._id, qty);
                        statusMsg.innerHTML = '<span style="color: #10b981;">Successfully added to cart! Redirecting...</span>';
                        setTimeout(() => {
                            window.location.href = 'cart.html';
                        }, 1000);
                    } catch (err) {
                        statusMsg.innerHTML = `<span style="color: #ef4444;">${err.message}</span>`;
                        document.getElementById('add-to-cart-btn').innerText = 'Add to Cart';
                    }
                });
            } catch (err) {
                container.innerHTML = `<p style="color: #ef4444;">Could not load product: ${err.message}</p>`;
            }
        });
    </script>
</body>
</html>
