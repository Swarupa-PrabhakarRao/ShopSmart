<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSmart | Cancel Orders</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .order-card {
            border-left: 4px solid var(--accent);
            margin-bottom: 1.5rem;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .order-status {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .status-placed { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .status-shipped { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .status-delivered { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .status-cancelled { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .order-items { display: flex; flex-direction: column; gap: 0.5rem; }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">ShopSmart.</a>
            <div style="display: flex; gap: 2rem; align-items: center;">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                </ul>
                <ul class="nav-links hidden" id="user-links">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="cancel-orders.html" style="color: var(--accent);">Cancel Orders</a></li>
                    <li><a href="cart.html">Cart</a></li>
                    <li>
                        <div class="profile-dropdown" onclick="toggleProfileDropdown(event)">
                            <div class="profile-icon" id="profile-initials">U</div>
                            <div id="profileDropdown" class="dropdown-content">
                                <div class="dropdown-header">
                                    <strong id="profile-name">User</strong>
                                    <span id="profile-email">user@example.com</span>
                                </div>
                                <a href="#" onclick="logout()">Logout</a>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <h1 class="mb-2">Cancel Active Orders</h1>

        <div class="card" style="max-width: 800px; margin: 0 auto;">
            <div id="cancel-orders-container">
                <p class="text-muted">Loading orders...</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ShopSmart. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!localStorage.getItem('token')) {
                window.location.href = 'auth.html';
                return;
            }
            loadOrders();
        });

        async function loadOrders() {
            const container = document.getElementById('cancel-orders-container');
            container.innerHTML = '<p class="text-muted">Loading orders...</p>';
            try {
                const orders = await api.orders.getAll();
                renderCancelableOrders(orders);
            } catch (err) {
                console.error(err);
                container.innerHTML = '<p style="color: #ef4444;">Failed to load orders.</p>';
            }
        }

        function renderCancelableOrders(orders) {
            const container = document.getElementById('cancel-orders-container');
            if (orders.length === 0) {
                container.innerHTML = '<p class="text-muted">You have no orders history.</p>';
                return;
            }

            container.innerHTML = '';
            orders.forEach(order => {
                const date = new Date(order.createdAt).toLocaleDateString();
                const statusClass = `status-${order.status.toLowerCase()}`;
                
                let isCancelable = false;
                if(order.status === 'Placed' || order.status === 'Processing') {
                    isCancelable = true;
                }

                let itemsHtml = '';
                order.products.forEach(item => {
                    const p = item.productId;
                    if(p) {
                        itemsHtml += `<div class="flex space-between text-muted" style="font-size: 0.9rem;">
                            <span>${item.quantity}x ${p.name}</span>
                        </div>`;
                    }
                });

                container.innerHTML += `
                    <div class="card order-card" style="padding: 1rem;">
                        <div class="order-header" style="margin-bottom: 0.5rem; padding-bottom: 0.5rem;">
                            <div>
                                <strong>Order #${order._id.substring(18)}</strong>
                                <div class="text-muted" style="font-size: 0.85rem;">Placed on ${date}</div>
                            </div>
                            <span class="order-status ${statusClass}">${order.status}</span>
                        </div>
                        <div class="order-items mb-1">
                            ${itemsHtml}
                        </div>
                        <div class="flex space-between align-center mt-1">
                            <span style="font-weight: bold;">Total: $${order.totalAmount.toFixed(2)}</span>
                            ${isCancelable ? 
                                `<button class="btn btn-danger" id="cancel-btn-${order._id}" onclick="cancelOrder('${order._id}')">Cancel Order</button>` 
                                : `<span class="text-muted" style="font-size:0.9rem;">Not Cancelable</span>`
                            }
                        </div>
                        <div id="msg-${order._id}" class="mt-1 text-center" style="font-size: 0.9rem;"></div>
                    </div>
                `;
            });
        }

        async function cancelOrder(orderId) {
            if(!confirm('Are you sure you want to cancel this order?')) return;
            
            const btn = document.getElementById(`cancel-btn-${orderId}`);
            const msg = document.getElementById(`msg-${orderId}`);
            btn.innerText = 'Cancelling...';
            btn.disabled = true;

            try {
                await api.orders.cancel(orderId);
                msg.innerHTML = '<span style="color: #10b981;">Order cancelled successfully!</span>';
                setTimeout(() => loadOrders(), 1500);
            } catch(err) {
                msg.innerHTML = `<span style="color: #ef4444;">${err.message}</span>`;
                btn.innerText = 'Cancel Order';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
