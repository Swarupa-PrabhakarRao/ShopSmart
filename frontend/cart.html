<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSmart | Shopping Cart</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }
        .cart-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
        }
        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }
        .cart-item-details { flex: 1; }
        .cart-item-price { font-weight: 600; color: var(--accent); }
        .qty-controls { display: flex; align-items: center; gap: 0.5rem; }
        .qty-controls button { background: rgba(255,255,255,0.1); color: white; border: none; padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; }
        .qty-controls button:hover { background: rgba(255,255,255,0.2); }
        
        @media (max-width: 768px) {
            .cart-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">ShopSmart.</a>
            <div style="display: flex; gap: 2rem; align-items: center;">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                </ul>
                <ul class="nav-links" id="auth-links">
                    <li><a href="auth.html">Login</a></li>
                    <li><a href="auth.html?mode=signup" class="btn">Sign Up</a></li>
                </ul>
                <ul class="nav-links hidden" id="user-links">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="cancel-orders.html">Cancel Orders</a></li>
                    <li><a href="cart.html" style="color: var(--accent);">Cart</a></li>
                    <li>
                        <div class="profile-dropdown" onclick="toggleProfileDropdown(event)">
                            <div class="profile-icon" id="profile-initials">U</div>
                            <div id="profileDropdown" class="dropdown-content">
                                <div class="dropdown-header">
                                    <strong id="profile-name">User</strong>
                                    <span id="profile-email">user@example.com</span>
                                </div>
                                <a href="#" onclick="logout()">Logout</a>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <h1>Shopping Cart</h1>
        <div class="cart-grid mt-2">
            <div class="card">
                <div id="cart-items">
                    <p class="text-muted">Loading cart...</p>
                </div>
            </div>
            
            <div>
                <div class="card" id="cart-summary">
                    <h3 class="mb-1">Order Summary</h3>
                    <div class="flex space-between mb-1">
                        <span class="text-muted">Subtotal</span>
                        <span id="subtotal-val">$0.00</span>
                    </div>
                    <div class="flex space-between mb-1">
                        <span class="text-muted">Tax</span>
                        <span id="tax-val">$0.00</span>
                    </div>
                    <hr style="border-color: var(--border); margin: 1rem 0;">
                    <div class="flex space-between mb-2" style="font-size: 1.2rem; font-weight: 800;">
                        <span>Total</span>
                        <span id="total-val">$0.00</span>
                    </div>
                    <button class="btn" style="width: 100%;" id="checkout-btn">Proceed to Checkout</button>
                    <div id="checkout-msg" class="mt-1 text-center"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ShopSmart. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('token')) {
                window.location.href = 'auth.html';
                return;
            }
            loadCart();
        });

        async function loadCart() {
            try {
                const cart = await api.cart.get();
                renderCart(cart);
            } catch (err) {
                console.error(err);
                document.getElementById('cart-items').innerHTML = `<p style="color: #ef4444;">Could not load cart.</p>`;
            }
        }

        function renderCart(cart) {
            const container = document.getElementById('cart-items');
            
            if (!cart || !cart.products || cart.products.length === 0) {
                container.innerHTML = '<p class="text-muted">Your cart is empty. <a href="products.html" style="color:var(--accent);">Browse products</a></p>';
                document.getElementById('subtotal-val').innerText = '$0.00';
                document.getElementById('tax-val').innerText = '$0.00';
                document.getElementById('total-val').innerText = '$0.00';
                document.getElementById('checkout-btn').disabled = true;
                return;
            }

            document.getElementById('checkout-btn').disabled = false;
            let subtotal = 0;
            container.innerHTML = '';

            cart.products.forEach(item => {
                const p = item.productId;
                if (!p) return; 
                subtotal += p.price * item.quantity;
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="cart-item-details">
                            <h4>${p.name}</h4>
                            <p class="text-muted" style="font-size: 0.9rem;">${p.category}</p>
                            <div class="cart-item-price">$${p.price.toFixed(2)}</div>
                        </div>
                        <div class="qty-controls">
                            <button onclick="updateQty('${p._id}', ${item.quantity - 1})">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQty('${p._id}', ${item.quantity + 1})">+</button>
                        </div>
                        <button class="btn btn-danger" style="padding: 0.4rem 0.8rem; font-size: 0.9rem;" onclick="removeItem('${p._id}')">Remove</button>
                    </div>
                `;
            });

            const tax = subtotal * 0.05; 
            const total = subtotal + tax;
            document.getElementById('subtotal-val').innerText = `$${subtotal.toFixed(2)}`;
            document.getElementById('tax-val').innerText = `$${tax.toFixed(2)}`;
            document.getElementById('total-val').innerText = `$${total.toFixed(2)}`;
        }

        async function updateQty(productId, newQty) {
            if (newQty <= 0) {
                removeItem(productId);
                return;
            }
            try {
                const cart = await api.cart.update(productId, newQty);
                renderCart(cart);
            } catch (err) {
                alert(err.message);
            }
        }

        async function removeItem(productId) {
            try {
                const cart = await api.cart.remove(productId);
                renderCart(cart);
            } catch (err) {
                alert(err.message);
            }
        }

        document.getElementById('checkout-btn').addEventListener('click', async () => {
            const btn = document.getElementById('checkout-btn');
            const msg = document.getElementById('checkout-msg');
            btn.innerText = 'Processing...';
            btn.disabled = true;

            try {
                await api.orders.place();
                msg.innerHTML = '<span style="color: #10b981;">Order placed successfully! Redirecting...</span>';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
            } catch (err) {
                msg.innerHTML = `<span style="color: #ef4444;">${err.message}</span>`;
                btn.innerText = 'Proceed to Checkout';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
